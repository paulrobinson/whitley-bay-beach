name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: gh-pages
  cancel-in-progress: false

permissions:
  contents: write
  pages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: beachwalk.uk
          keep_files: false

      - name: Ensure GitHub Pages source is set to gh-pages branch
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.repos.updateInformationAboutPagesSite({
                owner: context.repo.owner,
                repo: context.repo.repo,
                source: {
                  branch: 'gh-pages',
                  path: '/'
                }
              });
              console.log('GitHub Pages source confirmed: gh-pages branch, / path');
            } catch (error) {
              console.log(`Pages configuration note: ${error.message}`);
            }
