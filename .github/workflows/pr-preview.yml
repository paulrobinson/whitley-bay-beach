name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish preview to gh-pages
        run: |
          PR=${{ github.event.pull_request.number }}
          SHA=${{ github.event.pull_request.head.sha }}

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Save files to deploy
          mkdir /tmp/preview
          cp index.html /tmp/preview/

          # Checkout or create gh-pages branch in a worktree
          git fetch origin gh-pages 2>/dev/null || true
          if git show-ref --quiet refs/remotes/origin/gh-pages; then
            git worktree add /tmp/gh-pages origin/gh-pages
          else
            git worktree add --orphan -b gh-pages /tmp/gh-pages
          fi

          mkdir -p /tmp/gh-pages/pr-${PR}
          cp /tmp/preview/index.html /tmp/gh-pages/pr-${PR}/index.html

          cd /tmp/gh-pages
          git add pr-${PR}/
          git diff --staged --quiet || git commit -m "Preview PR #${PR} @ ${SHA:0:7}"
          git push origin HEAD:gh-pages

      - name: Post preview link on PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.issue.number;
            const sha = '${{ github.event.pull_request.head.sha }}'.slice(0, 7);
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const url = `https://${owner}.github.io/${repo}/pr-${pr}/`;
            const marker = '<!-- pr-preview -->';
            const body = `${marker}\n## Preview\n\n[${url}](${url}) (commit \`${sha}\`)`;

            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number: pr });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: pr, body });
            }

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Remove preview directory
        run: |
          PR=${{ github.event.pull_request.number }}
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -d "pr-${PR}" ]; then
            git rm -rf "pr-${PR}/"
            git commit -m "Remove preview for PR #${PR}"
            git push origin gh-pages
          fi
